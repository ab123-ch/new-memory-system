# 技能创建提示词模板
name: skill_creation
version: "1.0"
description: 根据经验内容创建新技能的元信息

template: |
  分析以下经验内容，生成技能的元信息。

  ## 经验内容
  {experience_content}

  ## 上下文
  {context}

  ## 任务

  请根据经验内容，生成一个合适的技能元信息。

  ### 命名规则
  - 使用小写字母、数字和连字符
  - 不能以连字符开头或结尾
  - 最多 64 个字符
  - 应该简洁且有意义

  ### 描述规则
  - 说明技能何时使用
  - 最多 1024 个字符
  - 应该帮助用户理解技能的用途

  ### 关键词规则
  - 选择 3-7 个触发关键词
  - 关键词应该能够匹配相关的用户请求
  - 包含中文和英文关键词（如果适用）

  ## 输出格式（严格 JSON）
  {{
      "name": "skill-name",
      "description": "技能描述，说明何时使用",
      "trigger_keywords": ["关键词1", "关键词2", "关键词3"]
  }}

  ## 示例

  输入经验：关于写代码时避免重复构建对象的建议

  输出：
  {{
      "name": "coding",
      "description": "编写、调试、优化代码的经验。当用户请求写代码、修复bug、优化性能时使用。",
      "trigger_keywords": ["代码", "函数", "bug", "实现", "修复", "code", "function"]
  }}
